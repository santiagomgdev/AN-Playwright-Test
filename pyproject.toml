[tool.pytest.ini_options]
addopts = [
    "--browser", "chromium",
    "--browser", "firefox",
    "--screenshot=only-on-failure",
    "--video=retain-on-failure",
    "--tracing=retain-on-failure",
]
markers = [
    "e2e: End-to-end tests",
    "integration: Integration tests",
    "api: API tests",
    "skip_browser: Skip test for a specific browser",
    "only_browser: Run test only on a specific browser",
]